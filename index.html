<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GitHub Profile Search</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>GitHub Profile Search</h2>

<input type="text" id="username" placeholder="Enter GitHub username">

<div class="card" id="card">
  <img id="avatar">
  <h3 id="name"></h3>
  <p id="bio"></p>
  <p><strong>Joined:</strong> <span id="date"></span></p>
  <p><a id="blog" target="_blank">Portfolio</a></p>
</div>
<br>
<div id="repos" style="background: #161b22; padding: 20px; width: 300px; border-radius: 15px;"></div>

<script src="logic.js"></script>

</body>
</html>
